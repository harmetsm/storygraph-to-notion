name: Deploy Functions
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs at 9:00 AM UTC every day
     - cron: '0 9 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        # project dependencies require Node >=20.19.0
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      # `npm ci` fails when the lockfile is out of sync with package.json (see previous errors).
      # just do a normal install which updates the lockfile; commit the lockfile afterwards.
      run: npm install
      
    # Notion SDK is now listed in package.json, regular install covers it
      
    - name: Print directory structure for debugging
      run: find . -type f -not -path "*/node_modules/*" -not -path "*/.git/*" | sort
      
    - name: Sync data to Notion
      if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
      run: node utils/syncToNotion.js
      env:
        USERNAME: ${{ secrets.USERNAME }}
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        NODE_OPTIONS: --experimental-modules

    - name: Create production build directory
      run: mkdir -p dist/api/
    
    - name: Copy function files
      run: |
        cp -r functions/* dist/api/
        cp package.json dist/
        cp -r utils dist/api/
        cp -r node_modules dist/
    
    - name: Deploy
      if: github.ref == 'refs/heads/main'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: dist
        branch: gh-pages
        token: ${{ secrets.GITHUB_TOKEN }}
      env:
        CI: true
        USERNAME: ${{ secrets.USERNAME }}